<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AIStarter 自动化 & AI 管理平台</title>
    <style>
        body {
            background: url('/images/share/share_bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-width: 1000px;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        h1 {
            font-size: 60px;
            color: rgb(233, 243, 243);
        }
        p {
            font-size: 18px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin: 10px 10px 10px 0px;
            padding: 10px 80px;
            font-size: 12px;
            border-radius: 5px;
            text-decoration: none;
            color: #000;
        }
        .btn-green {
            background-color: #22c55e;
        }
        .btn-green:hover {
            background-color: #22c55ee6;
        }
        .btn-outline {
            color: #fff;
            background-color: transparent;
            border: 1px solid #27272a;
        }
        .btn-outline:hover {
            background-color: #292524;
        }
        .banner {
            height: 100%;
            display: flex;
            align-items: center;
        }
        .banner-left {
            text-align: left;
        }
        .banner-right {
            width: 700px;
            height: 900px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .container-title{
            font-size:60px;
            font-weight: bold;
            color:transparent;
            background-image: linear-gradient(to right, #F596D3, #D247BF);
            -webkit-background-clip: text;
        }
        .container-titletwo{
            font-size:60px;
            font-weight: bold;
            color:transparent;
            background-image: linear-gradient(to right, #1fc0f1, #03a3d7);
            -webkit-background-clip: text;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="container banner-left">
            <h1><span class="container-title">AIStarter</span> 自动化 & <span class="container-titletwo">AI</span> 管理平台</h1>
            <p style="color: #a1a1aa;font-size: 19px;">AIStarter是一款免费的AI项目管理平台，旨在让用户能够在Windows、Mac或Linux上快速轻松地下载、安装和分享各类热门AI开源项目。</p>
            <a href="#" class="btn btn-green">立即下载</a>
            <a href="#" class="btn btn-outline">立即下载</a>
        </div>
        <div class="banner-right">
            <img src='/images/share/share_preview.png' alt="" width="900px">
        </div>
    </div>
</body>
</html>
