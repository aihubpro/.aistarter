<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      .lang-switch {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 9999;
      }
      .lang-switch button {
        padding: 6px 10px;
        border: 1px solid #ddd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .lang-switch button + button {
        margin-left: 6px;
      }
      .lang-switch button.active {
        background: #42b983;
        color: #fff;
        border-color: #42b983;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      function getCurrentLang() {
        var hash = location.hash.replace(/^#\/?/, '');
        var parts = hash.split('/');
        var lang = (parts[0] === 'zh' || parts[0] === 'en') ? parts[0] : 'zh';
        return lang;
      }

      window.switchLang = function (target) {
        var hash = location.hash.replace(/^#\/?/, '');
        var parts = hash.split('/').filter(Boolean);
        if (parts.length && (parts[0] === 'zh' || parts[0] === 'en')) {
          parts[0] = target;
        } else {
          parts.unshift(target);
        }
        location.hash = '/' + parts.join('/');
      };

      function buildSwitchHtml() {
        var curr = getCurrentLang();
        var zhActive = curr === 'zh' ? 'active' : '';
        var enActive = curr === 'en' ? 'active' : '';
        return (
          '<div class="lang-switch">' +
          '<button class="' + zhActive + '" onclick="window.switchLang(\'zh\')">中文</button>' +
          '<button class="' + enActive + '" onclick="window.switchLang(\'en\')">English</button>' +
          '</div>'
        );
      }

      window.$docsify = {
        name: 'Docs',
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 2,
        homepage: 'zh/1_about.md',
        plugins: [
          function (hook, vm) {
            hook.afterEach(function (html, next) {
              next(buildSwitchHtml() + html);
            });
            hook.doneEach(function () {
              var curr = getCurrentLang();
              var container = document.querySelector('.lang-switch');
              if (container) {
                var buttons = container.querySelectorAll('button');
                buttons.forEach(function (btn) { btn.classList.remove('active'); });
                var idx = curr === 'zh' ? 0 : 1;
                if (buttons[idx]) buttons[idx].classList.add('active');
              }
            });
          }
        ]
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  </body>
  </html>
